# Named joint poses for kinematics testing.
# Angles use the configured positive-up shoulder and positive elbow-bend conventions.
# They are mathematical joint angles, not guaranteed real servo angles.
# Update after measuring physical home and safe limits.

# Version of this configuration file format.
schema_version = "1.0"
# Unit used for all joint-angle values in this file.
units_angle = "deg"

[poses.cad_reference]
# Human-readable explanation of this pose.
description = "Approximate pose represented by the STEP assembly geometry"
# Base rotation angle.
J1_base = 0.0
# Shoulder joint angle.
J2_shoulder = 90.0
# Positive elbow bend angle.
J3_elbow = 90.0
# Wrist pitch angle.
J4_wrist = 0.0
# Gripper command placeholder angle/value.
J5_gripper = 0.0

[poses.home]
# Human-readable explanation of this pose.
description = "Provisional software home; replace with measured repeatable home pose"
# Base rotation angle for the home pose.
J1_base = 0.0
# Shoulder angle for the home pose.
J2_shoulder = 90.0
# Positive elbow bend angle for the home pose.
J3_elbow = 135.0
# Wrist angle for the home pose.
J4_wrist = -25.0
# Gripper command for the home pose.
J5_gripper = 0.0
# Marks that this pose still needs real-world measurement.
requires_measurement = true

[poses.ready]
# Human-readable explanation of this pose.
description = "Provisional ready pose with gripper lifted away from workspace"
# Base rotation angle for the ready pose.
J1_base = 0.0
# Shoulder angle for the ready pose.
J2_shoulder = 75.0
# Positive elbow bend angle for the ready pose.
J3_elbow = 75.0
# Wrist angle for the ready pose.
J4_wrist = 0.0
# Gripper command for the ready pose.
J5_gripper = 0.0
# Marks that this pose must be tested before real use.
requires_verification = true

[poses.deposit]
# Human-readable explanation of this pose.
description = "Provisional joint fallback for the measured drop-off target; replace after its X distance and servo pose are measured."
# Base rotation angle for the deposit pose.
J1_base = 45.0
# Shoulder angle for the deposit pose.
J2_shoulder = 70.0
# Positive elbow bend angle for the deposit pose.
J3_elbow = 70.0
# Wrist angle for the deposit pose.
J4_wrist = 0.0
# Gripper command for the deposit pose.
J5_gripper = 0.0
# Marks that this pose must be tested before real use.
requires_verification = true

[cartesian_targets.drop_off]
# Complete measured drop-off target in the top-down runtime frame.
description = "Drop-off point measured from the box top and center planes"
# X is centered in the box depth.
x_mm = 0.0
# Distance downward from the top reference.
y_mm = 370.0
# Lateral offset from the centerline; positive Z is right.
z_mm = 130.0
z_direction = "right"
source = "Maße Roboter 1. Runde.md; follow-up physical measurement"

[gripper_commands]
# These are pulse commands, not angles. Values must be measured.
# Pulse width used to open the gripper.
open_pulse_us = 1200
# Pulse width used to fully close the gripper.
closed_pulse_us = 1800
# Pulse width used to keep holding an object after gripping.
hold_pulse_us = 1700
# Marks that the gripper pulse values still need physical measurement.
requires_measurement = true
