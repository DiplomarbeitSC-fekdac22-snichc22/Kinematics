# Named joint poses for kinematics testing and verified controller playback.
# The top-level J1-J5 values use the configured positive-up shoulder and positive elbow-bend conventions.
# Nested controller angles are the manual Robot-Controller command values used to record each real pose.
# Nested pulse overrides are the concrete PCA9685 commands used when executing a recorded named pose.

# Version of this configuration file format.
schema_version = "2.0"
# Unit used for all joint-angle values in this file.
units_angle = "deg"
# Unit used for recorded pulse-width values in this file.
units_pulse = "us"

[poses.cad_reference]
# Human-readable explanation of this pose.
description = "Approximate pose represented by the STEP assembly geometry"
# Base rotation angle.
J1_base = 0.0
# Shoulder joint angle. The STEP assembly extends downward from the roof.
J2_shoulder = -90.0
# Positive elbow bend angle.
J3_elbow = 90.0
# Wrist pitch angle.
J4_wrist = 0.0
# Gripper command placeholder angle/value.
J5_gripper = 0.0

[poses.home]
# Human-readable explanation of this pose.
description = "Physically recorded home pose; mathematical joint values remain provisional for FK and simulation"
# Base rotation angle in the mathematical kinematic convention.
J1_base = 0.0
# Shoulder angle in the mathematical kinematic convention.
J2_shoulder = -90.0
# Positive elbow bend angle in the mathematical kinematic convention.
J3_elbow = 150.0
# Wrist angle in the mathematical kinematic convention.
J4_wrist = 60.0
# Gripper command for the home pose.
J5_gripper = 0.0
# Timestamp written by the manual pose recorder.
recorded_at_utc = "2026-07-23T12:06:27.985351+00:00"
# The controller command and pulse values were measured on the real robot.
requires_measurement = false
# Physical mathematical link angles still have to be measured independently.
kinematic_angles_require_measurement = true

