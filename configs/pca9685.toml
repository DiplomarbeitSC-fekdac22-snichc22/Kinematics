# PCA9685 PWM conversion constants for servo pulse output.
# This is hardware-adjacent, but included because kinematics output must eventually become servo pulse/count commands.

# Version of this configuration file format.
schema_version = "1.2"

# Default PCA9685 I2C address.
i2c_address = 0x40
# Number of physical PCA9685 output channels.
channel_count = 16

# PWM update frequency used by the PCA9685 board.
frequency_hz = 50
# Number of discrete counter values in one PWM period.
resolution_counts = 4096
# Duration of one complete PWM period at the configured frequency.
period_us = 20000.0

[conversion]
# Formula for converting a servo pulse width in microseconds to a PCA9685 count value.
formula_pulse_to_count = "round(pulse_us / period_us * resolution_counts)"
# Formula for converting a PCA9685 count value back to pulse width in microseconds.
formula_count_to_pulse = "count / resolution_counts * period_us"

formula_count_to_duty_cycle = "count * (65536 / resolution_counts)"

[examples]
# Example PCA9685 count for a 500 us pulse.
count_at_500_us = 102
# Example PCA9685 count for a centered 1500 us pulse.
count_at_1500_us = 307
# Example PCA9685 count for a 2500 us pulse.
count_at_2500_us = 512

duty_cycle_at_1500_us = 4912

[channel_map]
# PCA9685 channel connected to the base servo.
J1_base = 0
# PCA9685 channel connected to the shoulder servo.
J2_shoulder = 2
# PCA9685 channel connected to the elbow servo.
J3_elbow = 4
# PCA9685 channel connected to the wrist servo.
J4_wrist = 8
# PCA9685 channel connected to the gripper servo.
J5_gripper = 6

[notes]
channel_map_status = "matched_to_robot_schematic_servomotor_4_gripper_and_servomotor_5_wrist"

text = "Verify servo direction and mechanical pulse limits before unattended operation."
