# Runtime settings for the kinematic solver only.
# Vision should provide target coordinates already in robot-base coordinates.
# Coordinate convention: X and Z form the horizontal plane; Y is vertical height.

schema_version = "1.0"
units_length = "mm"
units_angle = "deg"

[model]
type = "4_dof_arm_plus_gripper"
base_joint = "J1_base"
planar_joints = ["J2_shoulder", "J3_elbow", "J4_wrist"]
gripper_joint = "J5_gripper"
use_gripper_offset = true
use_h0_from_robot_geometry = true
selected_h0_key = "h0_selected"
selected_Lg_key = "Lg_selected"
vertical_axis = "y_mm"
horizontal_plane_axes = ["x_mm", "z_mm"]
base_angle_formula = "atan2(z_mm, x_mm)"

[ik]
input_frame = "robot_base"
solution_preference = "elbow_down"
# alpha is the desired gripper approach angle in the planar target plane.
# 0 deg means approximately horizontal/radial-forward approach in the current simplified model.
default_approach_angle_deg = 0.0
clamp_cosine_rule_argument = true
reject_unreachable_targets = true
minimum_reach_margin_mm = 5.0
maximum_reach_margin_mm = 5.0

[fk]
compare_against_observed_gripper = true
position_error_warning_mm = 15.0
position_error_fail_mm = 35.0

[motion_interpolation]
profile = "smoothstep"
step_time_s = 0.02
max_step_deg = 2.0
max_joint_speed_deg_per_s = 45.0
# This is kinematics-side path smoothing only. Servo acceleration/current limiting is hardware-specific.

[target_offsets]
# Used to generate safe intermediate poses around a target.
pre_grasp_y_offset_mm = 40.0
lift_after_grip_y_offset_mm = 50.0
approach_r_offset_mm = 20.0

[validation]
check_joint_limits = true
check_pulse_limits = true
check_reachability = true
check_workspace_bounds = true

[workspace_bounds_robot_base_mm]
# Very rough placeholders. Replace after physical testing.
# X and Z are horizontal. Y is height.
x_min = -350.0
x_max = 350.0
y_min = 0.0
y_max = 350.0
z_min = -350.0
z_max = 350.0
