# Runtime settings for the kinematic solver only.
# Vision should provide target coordinates already in robot-base coordinates.
# Coordinate convention: X is depth/forward, Z is lateral/right, and Y is distance downward from the top reference.

# Version of this configuration file format.
schema_version = "1.0"
# Unit used for all length/distance values in this file.
units_length = "mm"
# Unit used for all angular values in this file.
units_angle = "deg"

[model]
# Name of the robot model that the kinematics code should assume.
type = "4_dof_arm_plus_gripper"
# Joint used to rotate the arm around the vertical base axis.
base_joint = "J1_base"
# Joints that are solved in the 2D arm plane.
planar_joints = ["J2_shoulder", "J3_elbow", "J4_wrist"]
# Joint used for opening and closing the gripper.
gripper_joint = "J5_gripper"
# Whether the wrist-to-gripper length should be included in IK/FK calculations.
use_gripper_offset = true
# Whether the shoulder height offset h0 should be read from robot_geometry.toml.
# For top-down y, shoulder_y = base_mount_y - h0.
use_h0_from_robot_geometry = true
# Key in robot_geometry.toml that contains the selected base/mounting-plate to shoulder height offset.
selected_h0_key = "h0_selected"
# Key in robot_geometry.toml that contains the selected wrist-to-gripper length.
selected_Lg_key = "Lg_selected"
# Coordinate field used as the vertical/top-down axis.
vertical_axis = "y_mm"
# Coordinate fields used as the horizontal robot-base plane.
horizontal_plane_axes = ["x_mm", "z_mm"]
# Formula used to compute the base rotation angle from target coordinates.
base_angle_formula = "atan2(z_mm - base_z_mm, x_mm - base_x_mm)"

[input_coordinates]
# User target convention from Robot Coordinate System.pdf.
x_axis = "depth_forward_mm"
z_axis = "left_right_mm"
y_axis = "distance_down_from_top_mm"
# Positive X points forward from the box-depth center plane.
x_positive_direction = "forward"
# Positive Z points to the right.
z_positive_direction = "right"
# y_mm grows downward from the top reference, like a measured distance from the top.
y_positive_direction = "down"
# Distance from the top reference to the base/mounting plate height.
max_height_mm = 500.0
# Center of the base rotation axis at the base/mounting plate height: x=0, y=max_height, z=0.
base_rotation_axis_at_mounting_plate_mm = [0.0, 500.0, 0.0]

[ik]
# Coordinate frame expected for inverse-kinematics input targets.
input_frame = "robot_base"
# Preferred IK solution when multiple arm configurations can reach a target.
solution_preference = "elbow_back"
# Desired gripper approach angle in the planar target plane.
# 0 deg means approximately horizontal/radial-forward approach in the current simplified model.
default_approach_angle_deg = 0.0
# Clamp tiny numerical errors in cosine-rule calculations to the valid [-1, 1] range.
clamp_cosine_rule_argument = true
# Reject target positions that are outside the arm's reachable workspace.
reject_unreachable_targets = true
# Minimum extra distance used when checking whether targets are too close to the arm.
minimum_reach_margin_mm = 5.0
# Maximum extra distance used when checking whether targets are too far away.
maximum_reach_margin_mm = 5.0

[angle_convention]
# Side-view convention from 2D Arm Diagram.png.
arm_plane_forward = "toward_target_front"
# Shoulder 0 deg points forward/horizontal; positive rotates down/back toward the elbow.
shoulder_zero = "forward_horizontal"
shoulder_positive = "down_to_back"
# Elbow 0 deg points from elbow back toward the shoulder; positive rotates toward the wrist.
elbow_zero = "toward_shoulder"
elbow_positive = "toward_wrist"

[fk]
# Compare forward-kinematics output against observed/measured gripper positions when available.
compare_against_observed_gripper = true
# Position error that should produce a warning but not necessarily fail validation.
position_error_warning_mm = 15.0
# Position error large enough to be considered a failed FK/measurement comparison.
position_error_fail_mm = 35.0

[motion_interpolation]
# Interpolation curve used between motion waypoints.
profile = "smoothstep"
# Time between generated interpolation steps.
step_time_s = 0.02
# Maximum allowed joint-angle change per interpolation step.
max_step_deg = 2.0
# Maximum allowed joint speed during generated motion.
max_joint_speed_deg_per_s = 45.0
# This is kinematics-side path smoothing only. Servo acceleration/current limiting is hardware-specific.

[target_offsets]
# Vertical offset used to create a safe pre-grasp pose above the target.
pre_grasp_y_offset_mm = 40.0
# Vertical lift after closing the gripper.
lift_after_grip_y_offset_mm = 50.0
# Horizontal/radial offset used while approaching a target.
approach_r_offset_mm = 20.0

[validation]
# Check commanded joint angles against configured joint limits.
check_joint_limits = true
# Check generated PWM pulses against configured servo pulse limits.
check_pulse_limits = true
# Check whether the target is reachable by the arm geometry.
check_reachability = true
# Check whether target coordinates are inside the configured workspace box.
check_workspace_bounds = true
# Check the side-view shape from 2D Arm Diagram.png: elbow back, wrist forward.
check_side_view_orientation = true

[physical_enclosure_mm]
# Measurements from "Maße Roboter 1. Runde.md". These are the nominal box interior dimensions.
height = 500.0
depth = 400.0
width = 360.0

[elbow_clearance_mm]
# Additional clearance beyond the nominal box depth. The front allowance varies by location.
front_extra_min = 20.0
front_extra_max = 40.0
rear_extra = 20.0
# The nominal target workspace below does not include this elbow-only clearance.

[shelving_mm]
# Distance downward from the box top at which the first shelf/compartment starts.
first_shelf_from_top = 125.0
# Clear height of each shelf compartment.
compartment_height = 120.0
# Thickness of each shelf floor.
floor_thickness = 5.0
# Shelf reference position along X, measured from the box-depth centerline.
x_position_mm = 100.0
# Shelves lie in the positive-X direction from the box-depth centerline.
x_direction = "positive"

[workspace_bounds_robot_base_mm]
# Measured nominal box interior. Elbow-only clearance is recorded separately above.
# X is depth from the box-depth centerline, Z is lateral from the width centerline, and Y is distance from the top.
# Rear edge of the nominal target workspace: 200 mm behind the X=0 center plane.
x_min = -200.0
# Front edge of the nominal target workspace: 200 mm in the positive-X/forward direction.
x_max = 200.0
# Minimum allowed Y distance downward from the top reference.
y_min = 0.0
# Maximum allowed Y distance downward from the top reference.
y_max = 500.0
# Left edge of the 360 mm wide box relative to its centerline.
z_min = -180.0
# Right edge of the 360 mm wide box relative to its centerline.
z_max = 180.0
