# Provisional minimum safe mathematical angle.
theta_min_deg = -60.0
# Provisional maximum safe mathematical angle.
theta_max_deg = 60.0
# Direction sign from mathematical angle to servo pulse change.
direction = 1
# Pulse width corresponding to the mathematical zero/center position.
pulse_center_us = 1500
# Provisional electrical minimum retained for kinematic conversion.
pulse_min_us = 500
# Provisional electrical maximum retained for kinematic conversion.
pulse_max_us = 2500
# Provisional conversion factor based on approximately 120 degrees over 500-2500 us.
us_per_degree = 16.6666666667
# Initial angle used by the verified manual Robot-Controller configuration.
