# Provisional servo calibration for kinematics output.
# Source values: PWM hobby-servo control uses pulse widths around 500-2500 us and center around 1500 us.
# IMPORTANT: STEP/CAD does not contain safe mechanical limits, actual servo direction, or final pulse calibration.
# Measure these values before commanding real hardware.

# Version of this configuration file format.
schema_version = "1.1"
# Unit used for joint-angle values.
units_angle = "deg"
# Unit used for servo pulse-width values.
units_pulse = "us"
# Safety status of this calibration data.
calibration_status = "provisional_not_safe_for_unattended_real_robot"

[defaults]
# PWM frequency used for all hobby servo channels.
pwm_frequency_hz = 50
# Lowest electrical pulse width normally considered for hobby servos.
pulse_electrical_min_us = 500
# Center pulse width normally considered neutral for hobby servos.
pulse_electrical_center_us = 1500
# Highest electrical pulse width normally considered for hobby servos.
pulse_electrical_max_us = 2500
# Conservative first-test pulse range. Expand only after manual verification.
# Lower bound used for safe initial hardware tests.
pulse_initial_safe_min_us = 1000
# Upper bound used for safe initial hardware tests.
pulse_initial_safe_max_us = 2000
# Assumed total servo travel range before physical calibration.
servo_nominal_range_deg = 270.0
# Provisional conversion factor from angle degrees to pulse microseconds.
us_per_degree_nominal = 7.4074074074
# Whether generated pulses should be limited to the conservative first-test range.
clamp_to_initial_safe_range = true

[joints.J1_base]
# Physical function of this joint.
function = "base_rotation"
# Servo model/type currently assumed for this joint.
servo_type = "unknown_existing_pwm_servo"
# PCA9685 output channel connected to this servo.
pca9685_channel = 0
# Kinematic angle represented by this joint.
kinematic_role = "theta1"
# Mathematical angle corresponding to the configured center/zero reference.
theta_zero_deg = 0.0
# Provisional home angle for this joint.
theta_home_deg = 0.0
# Provisional minimum safe mathematical angle.
theta_min_deg = -90.0
# Provisional maximum safe mathematical angle.
theta_max_deg = 90.0
# Direction sign from mathematical angle to servo pulse change.
direction = 1
# Pulse width corresponding to the zero/center position.
pulse_center_us = 1500
# Provisional minimum pulse width for this servo.
pulse_min_us = 1000
# Provisional maximum pulse width for this servo.
pulse_max_us = 2000
# Conversion factor from degrees to pulse microseconds for this joint.
us_per_degree = 7.4074074074
# Marks that this joint's values must be measured on the real robot.
requires_physical_calibration = true
# Extra calibration note for this joint.
notes = "Base servo was not reliably identified from the STEP extraction. Verify channel, direction, limits, and zero."

