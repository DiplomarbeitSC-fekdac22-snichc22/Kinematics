[joints.J5_gripper]
# Physical function of this joint/servo.
function = "gripper"
# Four-wire B2122 analog-feedback servo installed as the gripper in the verified controller assignment.
servo_type = "B2122_analog_feedback_120_degree"
source_files = ["Bauteil_010.pdf", "Bauteil_002.pdf"]
# PCA9685 output channel connected to the gripper servo.
pca9685_channel = 8
# Kinematic command represented by this servo.
kinematic_role = "gripper_command"
# Gripper is controlled by the recorded controller command-angle mapping.
theta_zero_deg = 0.0
# Recorded home/open command for the gripper.
theta_home_deg = 0.0
# Recorded minimum gripper command value.
theta_min_deg = 0.0
# Recorded maximum gripper command value.
theta_max_deg = 90.0
# Direction sign from command value to servo pulse change.
direction = 1
# Pulse width corresponding to the open/zero command.
pulse_center_us = 732.421875
# Recorded open pulse width.
pulse_min_us = 732.421875
# Recorded closed pulse width.
pulse_max_us = 1831.0546875
# Conversion factor for the controller's 0-90 degree gripper command range.
us_per_degree = 12.20703125
# Initial angle used by the verified manual Robot-Controller configuration.
controller_initial_angle_deg = 0
# Controller command-angle limits used during the physical pose recording.
controller_angle_min_deg = 0
controller_angle_max_deg = 90
# Legacy controller mapping endpoints and neutral pulse.
controller_pulse_min_us = 732.421875
neutral_pulse_us = 1831.0546875
controller_pulse_max_us = 2929.6875
# Pulse width used to open the gripper.
pulse_open_us = 732.421875
# Pulse width used to close the gripper.
pulse_closed_us = 1831.0546875
# The electrical command mapping is recorded; jaw width and gripping force still require object tests.
requires_physical_calibration = false
# Extra calibration note for the gripper.
notes = "The B2122 channel assignment and 0/90 degree open/closed controller commands were recorded. Verify closed jaw width, object retention, and feedback wiring separately."
