# Provisional servo calibration for kinematics output.
# Product-sheet pulse values are recorded per joint. Do not assume that every
# servo shares the same electrical endpoints.
# IMPORTANT: STEP/CAD does not contain safe mechanical limits, actual servo direction, or final pulse calibration.
# Measure these values before commanding real hardware.

# Version of this configuration file format.
schema_version = "2.0"
# Unit used for joint-angle values.
units_angle = "deg"
# Unit used for servo pulse-width values.
units_pulse = "us"
# Safety status of this calibration data.
calibration_status = "provisional_not_safe_for_unattended_real_robot"

[defaults]
# PWM frequency used for all hobby servo channels.
pwm_frequency_hz = 50
# Lowest endpoint stated by the supplied 20 kg and analog-feedback sheets.
pulse_electrical_min_us = 500
# Center pulse width normally considered neutral for hobby servos.
pulse_electrical_center_us = 1500
# Highest endpoint stated by the supplied 20 kg and analog-feedback sheets.
pulse_electrical_max_us = 2500
# Conservative first-test pulse range. Expand only after manual verification.
# Lower bound used for safe initial hardware tests.
pulse_initial_safe_min_us = 1000
# Upper bound used for safe initial hardware tests.
pulse_initial_safe_max_us = 2000
# Travel range of the supplied 270 degree digital-servo profile.
servo_nominal_range_deg = 270.0
# Provisional conversion factor from angle degrees to pulse microseconds.
us_per_degree_nominal = 7.4074074074
# Whether the PCA9685 hardware sink should enforce the conservative first-test
# range. Kinematics still reports the unclipped calibrated pulse so an unsafe
# request is visible instead of silently changed.
clamp_to_initial_safe_range = true

[joints.J1_base]
# Physical function of this joint.
function = "base_rotation"
# Servo model/type identified from the 270 degree 20 kg product sheet.
servo_type = "Miuzei_20kg_digital_270_degree"
source_files = ["Bauteil_007.pdf", "Bauteil_008.pdf", "Bauteil_009.pdf"]
# PCA9685 output channel connected to this servo.
pca9685_channel = 0
# Kinematic angle represented by this joint.
kinematic_role = "theta1"
# Mathematical angle corresponding to the configured center/zero reference.
theta_zero_deg = 0.0
# Provisional home angle for this joint.
theta_home_deg = 0.0
# Provisional minimum safe mathematical angle.
theta_min_deg = -90.0
# Provisional maximum safe mathematical angle.
theta_max_deg = 90.0
# Direction sign from mathematical angle to servo pulse change.
direction = 1
# Pulse width corresponding to the zero/center position.
pulse_center_us = 1500
# Product-sheet endpoint: 0 degrees at 500 us for the 270 degree profile.
# The hardware sink still enforces defaults.pulse_initial_safe_min_us.
pulse_min_us = 500
# Product-sheet endpoint: 270 degrees at 2500 us for the 270 degree profile.
# The hardware sink still enforces defaults.pulse_initial_safe_max_us.
pulse_max_us = 2500
# Conversion factor from degrees to pulse microseconds for this joint.
us_per_degree = 7.4074074074
# Marks that this joint's values must be measured on the real robot.
requires_physical_calibration = true
# Extra calibration note for this joint.
notes = "500-2500 us and 1500 us neutral are product-sheet values. Mathematical zero, direction, and mechanical stops still require measurement."

[joints.J2_shoulder]
# Physical function of this joint.
function = "shoulder"
# Servo model/type currently assumed for this joint.
servo_type = "Miuzei_DS3218_20kg_270_degree"
source_files = ["Bauteil_007.pdf", "Bauteil_008.pdf", "Bauteil_009.pdf"]
# PCA9685 output channel connected to this servo.
pca9685_channel = 2
# Kinematic angle represented by this joint.
kinematic_role = "theta2"
# Mathematical angle corresponding to the configured center/zero reference.
theta_zero_deg = 90.0
# Provisional home angle for this joint.
theta_home_deg = 90.0
# Provisional minimum safe mathematical angle.
theta_min_deg = 0.0
# Provisional maximum safe mathematical angle.
theta_max_deg = 160.0
# Direction sign from mathematical angle to servo pulse change.
direction = 1
# Pulse width corresponding to the zero/center position.
pulse_center_us = 1500
# Product-sheet minimum pulse width.
pulse_min_us = 500
# Product-sheet maximum pulse width.
pulse_max_us = 2500
# Conversion factor from degrees to pulse microseconds for this joint.
us_per_degree = 7.4074074074
# Marks that this joint's values must be measured on the real robot.
requires_physical_calibration = true
# Extra calibration note for this joint.
notes = "500-2500 us and 1500 us neutral are product-sheet values. Confirm mathematical zero, direction, and mechanical stops on the real arm."

[joints.J3_elbow]
# Physical function of this joint.
function = "elbow"
# Servo model/type currently assumed for this joint.
servo_type = "Miuzei_DS3218_20kg_270_degree"
source_files = ["Bauteil_007.pdf", "Bauteil_008.pdf", "Bauteil_009.pdf"]
# PCA9685 output channel connected to this servo.
pca9685_channel = 4
# Kinematic angle represented by this joint.
kinematic_role = "theta3"
# Mathematical angle corresponding to the configured center/zero reference.
theta_zero_deg = 90.0
# Provisional home angle for this joint.
theta_home_deg = 90.0
# Provisional minimum safe mathematical angle.
theta_min_deg = 0.0
# Provisional maximum safe mathematical angle.
theta_max_deg = 180.0
# Direction sign from mathematical angle to servo pulse change.
direction = 1
# Pulse width corresponding to the zero/center position.
pulse_center_us = 1500
# Product-sheet minimum pulse width.
pulse_min_us = 500
# Product-sheet maximum pulse width.
pulse_max_us = 2500
# Conversion factor from degrees to pulse microseconds for this joint.
us_per_degree = 7.4074074074
# Marks that this joint's values must be measured on the real robot.
requires_physical_calibration = true
