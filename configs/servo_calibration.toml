# Servo calibration for kinematics output and the verified manual-controller mapping.
# Product-sheet pulse values are recorded per joint. Do not assume that every
# servo shares the same electrical endpoints.
# IMPORTANT: The controller command angles are not automatically the same as the mathematical kinematic joint angles.
# Measure physical link angles before treating controller-angle values as kinematic calibration.

# Version of this configuration file format.
schema_version = "2.2"
# Unit used for joint-angle values.
units_angle = "deg"
# Unit used for servo pulse-width values.
units_pulse = "us"
# Safety status of this calibration data.
calibration_status = "controller_mapping_recorded_kinematic_angles_provisional"

[defaults]
# PWM frequency used for all hobby servo channels.
pwm_frequency_hz = 50
# Lowest endpoint stated by the supplied 20 kg and analog-feedback sheets.
pulse_electrical_min_us = 500
# Center pulse width normally considered neutral for hobby servos.
pulse_electrical_center_us = 1500
# Highest endpoint stated by the supplied 20 kg and analog-feedback sheets.
pulse_electrical_max_us = 2500
# Lower commissioning bound verified by the recorded controller positions.
pulse_initial_safe_min_us = 732
# Upper commissioning bound retained from the supplied servo sheets.
pulse_initial_safe_max_us = 2500
# Travel range of the supplied 270 degree digital-servo profile.
servo_nominal_range_deg = 270.0
# Provisional conversion factor from mathematical angle degrees to pulse microseconds.
us_per_degree_nominal = 7.4074074074
# Whether the PCA9685 hardware sink should enforce the commissioning range.
# Kinematics still reports the unclipped calibrated pulse so an unsafe request
# is visible instead of silently changed.
clamp_to_initial_safe_range = true
# Legacy Robot-Controller mapping used to obtain the recorded named poses.
controller_pulse_count_min = 150
controller_pulse_count_max = 600
controller_mapping_angle_min_deg = 0
controller_mapping_angle_max_deg = 180

[joints.J1_base]
# Physical function of this joint.
function = "base_rotation"
# Servo model/type identified from the 270 degree 20 kg product sheet.
servo_type = "Miuzei_20kg_digital_270_degree"
source_files = ["Bauteil_007.pdf", "Bauteil_008.pdf", "Bauteil_009.pdf"]
# PCA9685 output channel connected to this servo.
pca9685_channel = 0
# Kinematic angle represented by this joint.
kinematic_role = "theta1"
# Mathematical angle corresponding to the configured center/zero reference.
theta_zero_deg = 0.0
# Provisional mathematical home angle for this joint.
theta_home_deg = 0.0
# Provisional minimum safe mathematical angle.
theta_min_deg = -90.0
# Provisional maximum safe mathematical angle.
theta_max_deg = 90.0
# Direction sign from mathematical angle to servo pulse change.
direction = 1
# Pulse width corresponding to the mathematical zero/center position.
pulse_center_us = 1500
# Product-sheet endpoint: 0 degrees at 500 us for the 270 degree profile.
# The hardware sink also enforces defaults.pulse_initial_safe_min_us.
pulse_min_us = 500
# Product-sheet endpoint: 270 degrees at 2500 us for the 270 degree profile.
# The hardware sink also enforces defaults.pulse_initial_safe_max_us.
pulse_max_us = 2500
# Conversion factor from mathematical degrees to pulse microseconds for this joint.
us_per_degree = 7.4074074074
# Initial angle used by the verified manual Robot-Controller configuration.
controller_initial_angle_deg = 20
# Controller command-angle limits used during the physical pose recording.
controller_angle_min_deg = 0
controller_angle_max_deg = 130
# Legacy controller mapping endpoints and neutral pulse.
controller_pulse_min_us = 732.421875
neutral_pulse_us = 1831.0546875
controller_pulse_max_us = 2929.6875
# Marks that this joint's mathematical values must still be measured on the real robot.
requires_physical_calibration = true
# Extra calibration note for this joint.
notes = "The manual controller mapping and named-pose pulses are recorded. Mathematical zero, direction, and assembled mechanical limits still require link-angle measurement."

