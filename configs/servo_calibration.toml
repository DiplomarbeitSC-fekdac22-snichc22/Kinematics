[joints.J5_gripper]
# Physical function of this joint/servo.
function = "gripper"
# Servo model/type currently assumed for the gripper.
servo_type = "B2122_or_existing_gripper_servo"
# PCA9685 output channel connected to the gripper servo.
pca9685_channel = 8
# Kinematic command represented by this servo.
kinematic_role = "gripper_command"
# Gripper is normally controlled by calibrated pulses, not IK angle.
# Placeholder mathematical zero value for the gripper.
theta_zero_deg = 0.0
# Placeholder home value for the gripper.
theta_home_deg = 0.0
# Placeholder minimum gripper command value.
theta_min_deg = 0.0
# Placeholder maximum gripper command value.
theta_max_deg = 1.0
# Direction sign from command value to servo pulse change.
direction = 1
# Pulse width corresponding to the gripper center/neutral position.
pulse_center_us = 1500
# Provisional minimum pulse width for the gripper servo.
pulse_min_us = 1000
# Provisional maximum pulse width for the gripper servo.
pulse_max_us = 2000
# Placeholder conversion factor; gripper should use calibrated open/close pulses instead.
us_per_degree = 1.0
# Pulse width used to open the gripper.
pulse_open_us = 1200
# Pulse width used to close the gripper.
pulse_closed_us = 1800
# Marks that gripper values must be measured on the real robot.
requires_physical_calibration = true
# Extra calibration note for the gripper.
notes = "Open/closed pulses are placeholders. Measure actual open and object-grip positions before use."
