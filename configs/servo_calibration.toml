[joints.J4_wrist]
# Physical function of this joint.
function = "wrist_pitch"
# Four-wire analog-feedback servo used for Schwenker 3 / wrist pitch.
servo_type = "B2122_analog_feedback_120_degree"
source_files = ["Bauteil_010.pdf", "Bauteil_002.pdf"]
# PCA9685 output channel connected to this servo.
pca9685_channel = 8
# Kinematic angle represented by this joint.
kinematic_role = "theta4"
# Mathematical angle corresponding to the configured center/zero reference.
theta_zero_deg = 0.0
# Provisional home angle for this joint.
theta_home_deg = 0.0
# Provisional minimum safe mathematical angle.
theta_min_deg = -60.0
# Provisional maximum safe mathematical angle.
theta_max_deg = 60.0
# Direction sign from mathematical angle to servo pulse change.
direction = 1
# Pulse width corresponding to the zero/center position.
pulse_center_us = 1500
# Product-sheet minimum for approximately 120 degrees total rotation.
pulse_min_us = 500
# Product-sheet maximum for approximately 120 degrees total rotation.
pulse_max_us = 2500
# Conversion factor from degrees to pulse microseconds for this joint.
us_per_degree = 16.6666666667
# Marks that this joint's values must be measured on the real robot.
requires_physical_calibration = true
# Extra calibration note for this joint.
notes = "The sheet states approximately 120 degrees over 500-2500 us. Verify feedback wiring, mathematical zero, direction, and mechanical stops."

[joints.J5_gripper]
# Physical function of this joint/servo.
function = "gripper"
# Three-wire MG995 listed as Servomotor 4 / Greifer in the schematic.
servo_type = "MG995"
source_files = ["Bauteil_004.pdf", "Bauteil_005.pdf", "Bauteil_006.pdf", "Bauteil_002.pdf"]
# PCA9685 output channel connected to the gripper servo.
pca9685_channel = 6
# Kinematic command represented by this servo.
kinematic_role = "gripper_command"
# Gripper is normally controlled by calibrated pulses, not IK angle.
# Placeholder mathematical zero value for the gripper.
theta_zero_deg = 0.0
# Placeholder home value for the gripper.
theta_home_deg = 0.0
# Placeholder minimum gripper command value.
theta_min_deg = 0.0
# Placeholder maximum gripper command value.
theta_max_deg = 1.0
# Direction sign from command value to servo pulse change.
direction = 1
# Pulse width corresponding to the gripper center/neutral position.
pulse_center_us = 1500
# The supplied MG995 sheets state a 20 ms / 50 Hz period and 120 degree
# rotation but do not state pulse endpoints. Retain conservative placeholders.
pulse_min_us = 1000
pulse_max_us = 2000
# Placeholder conversion factor; gripper should use calibrated open/close pulses instead.
us_per_degree = 1.0
# Pulse width used to open the gripper.
pulse_open_us = 1200
# Pulse width used to close the gripper.
pulse_closed_us = 1800
# Marks that gripper values must be measured on the real robot.
requires_physical_calibration = true
# Extra calibration note for the gripper.
notes = "The MG995 sheet does not state endpoint pulses. The 1000-2000 us bounds and open/closed commands remain placeholders requiring measurement."
